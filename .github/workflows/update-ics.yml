name: Update MSI ICS

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-ics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ICS
        env:
          LOLESPORTS_API_KEY: ${{ secrets.LOLESPORTS_API_KEY }}
        run: python msi_to_ics.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add msi_schedule.ics
          git diff --staged --quiet || git commit -m "chore: update msi_schedule.ics"
          git push
